services:
  assay:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - assay-data:/data
    environment:
      - ASSAY_ADMIN_EMAIL=${ASSAY_ADMIN_EMAIL}
      - ASSAY_ADMIN_PASSWORD_HASH=${ASSAY_ADMIN_PASSWORD_HASH}
      - ASSAY_JWT_SECRET=${ASSAY_JWT_SECRET}
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - assay

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  assay-data:
  certbot-www:
  certbot-certs:
